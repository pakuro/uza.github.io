<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>にゃんこ大戦争 ゴキブリ版</title>
<style>
body{
  margin:0;
  background:#f4f4f4;
  font-family:sans-serif;
  text-align:center;
}

#topbar{
  background:#222;
  color:white;
  padding:10px;
  font-size:20px;
}

#field{
  position:relative;
  width:100%;
  height:400px;
  background:linear-gradient(#ddd,#bbb);
  overflow:hidden;
  border-top:3px solid black;
  border-bottom:3px solid black;
}

.goki{
  position:absolute;
  width:60px;
  height:100px;
  background-image:url('IMG_5172.png'); /* ← 同じフォルダに画像置いてね */
  background-size:contain;
  background-repeat:no-repeat;
}

.trap{
  position:absolute;
  width:80px;
  height:40px;
  background:brown;
  border:3px solid black;
}

button{
  margin:5px;
  padding:10px 20px;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="topbar">
  💰お金: <span id="money">100</span>
</div>

<div id="field"></div>

<div>
  <button onclick="spray()">ゴキブリスプレー (50)</button>
  <button onclick="slipper()">スリッパ母 (300)</button>
  <button onclick="placeTrap()">ゴキブリホイホイ (100)</button>
  <button onclick="clean()">clean (150)</button>
</div>

<script>
let money = 100;
let field = document.getElementById("field");
let moneyText = document.getElementById("money");
let traps = [];
let spawnRate = 2000;

// 毎秒お金
setInterval(()=>{
  money += 5;
  updateMoney();
},1000);

// ゴキ出現
setInterval(()=>{
  spawnGoki();
},spawnRate);

function updateMoney(){
  moneyText.textContent = money;
}

function spawnGoki(){
  let goki = document.createElement("div");
  goki.className = "goki";
  goki.style.left = "0px";
  goki.style.top = Math.random()*300 + "px";
  field.appendChild(goki);

  let hp = 3;
  let x = 0;

  let move = setInterval(()=>{
    x += 2;
    goki.style.left = x + "px";

    // トラップ判定
    traps.forEach(trap=>{
      let tx = parseInt(trap.style.left);
      if(x > tx-30 && x < tx+50){
        hp--;
        if(hp<=0){
          clearInterval(move);
          field.removeChild(goki);
          money += 20;
          updateMoney();
        }
      }
    });

    if(x>window.innerWidth){
      clearInterval(move);
      field.removeChild(goki);
    }
  },30);
}

function spray(){
  if(money<50) return;
  money-=50;
  updateMoney();

  let gokis = document.querySelectorAll(".goki");
  gokis.forEach(g=>{
    field.removeChild(g);
    money+=20;
  });
  updateMoney();
}

function slipper(){
  if(money<300) return;
  money-=300;
  updateMoney();

  let gokis = document.querySelectorAll(".goki");
  gokis.forEach(g=>{
    let chance = Math.random();
    if(chance>0.3){ // 強い
      field.removeChild(g);
      money+=20;
    }
  });
  updateMoney();
}

function placeTrap(){
  if(money<100) return;
  money-=100;
  updateMoney();

  let trap = document.createElement("div");
  trap.className="trap";
  trap.style.left = (Math.random()*window.innerWidth)+"px";
  trap.style.top = "330px";
  field.appendChild(trap);
  traps.push(trap);
}

function clean(){
  if(money<150) return;
  money-=150;
  updateMoney();
  traps=[];
  document.querySelectorAll(".trap").forEach(t=>field.removeChild(t));
}
</script>

</body>
</html>
