<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>世界一性格の悪いゲーム</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1a1a;
            font-family: sans-serif;
            overflow: hidden;
            cursor: crosshair;
        }

        #game-container {
            text-align: center;
            color: white;
        }

        /* 逃げるボタン */
        #troll-button {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            position: absolute;
            transition: all 0.1s ease;
        }

        /* 偽のロード画面 */
        #fake-loader {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="game-container">
    <h1 id="status-text">ボタンをクリックしてクリア！</h1>
    <p>（残り 100回クリック）</p>
    <button id="troll-button" style="top: 50%; left: 50%;">ここをクリック</button>
</div>

<div id="fake-loader">
    <div class="spinner"></div>
    <p id="loading-text">データを保存中... (99%)</p>
</div>

<script>
    const btn = document.getElementById('troll-button');
    const status = document.getElementById('status-text');
    const loader = document.getElementById('fake-loader');
    let count = 0;

    // 1. マウスが近づくと逃げる機能
    btn.addEventListener('mouseover', () => {
        const x = Math.random() * (window.innerWidth - btn.clientWidth);
        const y = Math.random() * (window.innerHeight - btn.clientHeight);
        btn.style.left = x + 'px';
        btn.style.top = y + 'px';
    });

    // 2. もしクリックできても（JavaScript的に）無効化
    btn.addEventListener('click', () => {
        alert("エラー：クリックが無効です。もう一度やり直してください。");
        location.reload(); // 強制リセット
    });

    // 3. 5秒ごとに「惜しい！」などの煽りメッセージを表示
    setInterval(() => {
        const taunts = ["遅すぎますよ？", "本気でやってます？", "手が震えてますね", "あ、今触れそうでしたねｗ"];
        status.innerText = taunts[Math.floor(Math.random() * taunts.length)];
    }, 3000);

    // 4. 開発者ツール（F12）を開こうとすると警告が出る（簡易的）
    window.addEventListener('keydown', (e) => {
        if(e.keyCode == 123) {
            alert("チートは禁止です。自分の実力でクリアしてください。");
            e.preventDefault();
        }
    });
</script>
</body>
</html>
