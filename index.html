<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2048 最強AI版</title>
<style>
body{
  font-family:Arial;
  background:#faf8ef;
  text-align:center;
}
h1{margin:10px;}
#score{font-size:24px;margin:10px;}
.grid{
  width:400px;
  height:400px;
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  background:#bbada0;
  padding:10px;
  border-radius:10px;
}
.cell{
  background:#cdc1b4;
  font-size:30px;
  font-weight:bold;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:5px;
}
button{
  padding:10px 20px;
  font-size:16px;
  margin:5px;
  cursor:pointer;
}
</style>
</head>
<body>

<h1>2048 最強AI版</h1>
<div id="score">Score: 0</div>
<button onclick="moveAI()">AI一手</button>
<button onclick="autoPlay()">AI連続</button>
<button onclick="init()">リセット</button>

<div class="grid" id="grid"></div>

<script>
let board = [];
let score = 0;
let auto = false;

function init(){
  board = Array(4).fill().map(()=>Array(4).fill(0));
  score = 0;
  auto = false;
  addTile();
  addTile();
  draw();
}
function addTile(){
  let empty=[];
  for(let r=0;r<4;r++)
    for(let c=0;c<4;c++)
      if(board[r][c]==0) empty.push([r,c]);
  if(empty.length==0) return;
  let [r,c]=empty[Math.floor(Math.random()*empty.length)];
  board[r][c]=Math.random()<0.9?2:4;
}
function draw(){
  let grid=document.getElementById("grid");
  grid.innerHTML="";
  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      let d=document.createElement("div");
      d.className="cell";
      d.textContent=board[r][c]||"";
      grid.appendChild(d);
    }
  }
  document.getElementById("score").textContent="Score: "+score;
}
function clone(b){return b.map(r=>r.slice());}
function rotate(b){
  let n=4;
  let res=Array(n).fill().map(()=>Array(n).fill(0));
  for(let r=0;r<n;r++)
    for(let c=0;c<n;c++)
      res[c][n-1-r]=b[r][c];
  return res;
}
function slide(row){
  row=row.filter(v=>v);
  for(let i=0;i<row.length-1;i++){
    if(row[i]==row[i+1]){
      row[i]*=2;
      score+=row[i];
      row[i+1]=0;
    }
  }
  row=row.filter(v=>v);
  while(row.length<4) row.push(0);
  return row;
}
function move(dir){
  let changed=false;
  let b=clone(board);
  for(let i=0;i<dir;i++) b=rotate(b);
  for(let r=0;r<4;r++){
    let newRow=slide(b[r]);
    if(newRow.toString()!=b[r].toString()) changed=true;
    b[r]=newRow;
  }
  for(let i=0;i<(4-dir)%4;i++) b=rotate(b);
  if(changed){
    board=b;
    addTile();
    draw();
  }
  return changed;
}

function evaluate(b){
  let empty=0;
  let monotonic=0;
  let max=0;

  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      if(b[r][c]==0) empty++;
      if(b[r][c]>max) max=b[r][c];
      if(c<3) monotonic+=b[r][c]>=b[r][c+1]?1:-1;
      if(r<3) monotonic+=b[r][c]>=b[r+1][c]?1:-1;
    }
  }
  let corner = Math.max(
    b[0][0], b[0][3],
    b[3][0], b[3][3]
  )==max ? 1000 : 0;

  return empty*100 + monotonic*10 + corner + max;
}

function simulate(dir){
  let temp=clone(board);
  let scBackup=score;
  if(move(dir)){
    let val=evaluate(board);
    board=temp;
    score=scBackup;
    return val;
  }
  return -Infinity;
}

function moveAI(){
  let best=-Infinity;
  let bestDir=0;
  for(let d=0;d<4;d++){
    let val=simulate(d);
    if(val>best){
      best=val;
      bestDir=d;
    }
  }
  move(bestDir);
}

function autoPlay(){
  auto=!auto;
  if(auto){
    function loop(){
      if(!auto) return;
      moveAI();
      setTimeout(loop,100);
    }
    loop();
  }
}

document.addEventListener("keydown",e=>{
  if(e.key=="ArrowUp") move(0);
  if(e.key=="ArrowRight") move(1);
  if(e.key=="ArrowDown") move(2);
  if(e.key=="ArrowLeft") move(3);
});

init();
</script>

</body>
</html>
