<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>因数分解トライアル - PURE</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #007aff;
            --error: #ff3b30;
            --success: #34c759;
            --border: #e5e5e5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            width: 90%;
            max-width: 600px;
            background: var(--bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* ヘッダー：シンプルに情報を整理 */
        header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .stat { text-align: center; }
        .stat span { font-size: 0.75rem; color: #86868b; font-weight: 600; display: block; margin-bottom: 4px; }
        .stat div { font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; }

        /* 問題エリア：視認性を最大化 */
        .question-area {
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
        }

        .math-expr {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* 選択肢：モダンなタイル形状 */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .option {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 20px;
            font-size: 1.1rem;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text);
        }

        .option:hover {
            border-color: var(--accent);
            background-color: rgba(0, 122, 255, 0.02);
        }

        .option:active {
            transform: scale(0.98);
            background-color: rgba(0, 122, 255, 0.05);
        }

        /* コンボ表示：控えめだが達成感のある演出 */
        #combo-display {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--accent);
            height: 1.2rem;
            margin-top: 8px;
        }

        /* オーバーレイ */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 { font-size: 2rem; margin-bottom: 10px; }
        p { color: #86868b; line-height: 1.6; }

        #start-btn {
            margin-top: 30px;
            background: var(--text);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #start-btn:hover { opacity: 0.8; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="game-container">
        <header>
            <div class="stat"><span>TIME</span><div id="timer">30</div></div>
            <div class="stat"><span>SCORE</span><div id="score">0</div></div>
            <div class="stat"><span>MAX COMBO</span><div id="max-combo">0</div></div>
        </header>

        <div class="question-area">
            <div id="question" class="math-expr">---</div>
            <div id="combo-display"></div>
        </div>

        <div id="options" class="options-grid"></div>

        <div id="overlay" class="overlay">
            <h1 id="title">FACTORIZE</h1>
            <p id="description">正確かつ迅速に解き続けろ。<br>正解 +2s / 誤答 -3s</p>
            <div id="result-stats" class="hidden">
                <h2 id="final-rank" style="color: var(--accent);"></h2>
            </div>
            <button id="start-btn">START</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "x² - 10x + 25", a: "(x - 5)²", options: ["(x - 5)²", "(x + 4)²", "(x - 25)(x - 1)", "(x - 5)(x + 5)"] },
            { q: "x² + 7x + 12", a: "(x + 3)(x + 4)", options: ["(x + 3)(x + 4)", "(x + 2)(x + 6)", "(x + 7)(x + 1)", "(x - 3)(x - 4)"] },
            { q: "x² - 64", a: "(x + 8)(x - 8)", options: ["(x + 8)(x - 8)", "(x - 8)²", "(x + 4)(x - 16)", "x(x - 64)"] },
            { q: "x² - 5x - 14", a: "(x - 7)(x + 2)", options: ["(x - 7)(x + 2)", "(x + 7)(x - 2)", "(x - 14)(x + 1)", "(x - 2)(x - 7)"] },
            { q: "3x² + 12x + 12", a: "3(x + 2)²", options: ["3(x + 2)²", "3(x + 4)(x + 1)", "3(x + 2)(x - 2)", "(3x + 6)(x + 2)"] },
            { q: "2x² - 18", a: "2(x + 3)(x - 3)", options: ["2(x + 3)(x - 3)", "2(x - 3)²", "2(x + 9)(x - 9)", "(2x - 6)(x + 3)"] },
            { q: "2x² + 7x + 3", a: "(2x + 1)(x + 3)", options: ["(2x + 1)(x + 3)", "(2x + 3)(x + 1)", "(x + 3)²", "(2x - 1)(x - 3)"] },
            { q: "x² - 2xy + y²", a: "(x - y)²", options: ["(x - y)²", "(x + y)²", "(x - y)(x + y)", "x(x - 2y)"] },
            { q: "x² + 13x + 36", a: "(x + 4)(x + 9)", options: ["(x + 4)(x + 9)", "(x + 6)²", "(x + 3)(x + 12)", "(x - 4)(x - 9)"] },
            { q: "5x² - 20x + 15", a: "5(x - 1)(x - 3)", options: ["5(x - 1)(x - 3)", "5(x - 2)²", "5(x + 1)(x + 3)", "(5x - 5)(x - 3)"] }
        ];

        let score = 0, combo = 0, maxCombo = 0, timeLeft = 30, timerInterval;

        const timerEl = document.getElementById('timer'),
              scoreEl = document.getElementById('score'),
              maxComboEl = document.getElementById('max-combo'),
              comboDisp = document.getElementById('combo-display'),
              questionEl = document.getElementById('question'),
              optionsEl = document.getElementById('options'),
              overlay = document.getElementById('overlay'),
              startBtn = document.getElementById('start-btn');

        function startGame() {
            score = 0; combo = 0; maxCombo = 0; timeLeft = 30;
            updateStats();
            overlay.classList.add('hidden');
            document.getElementById('result-stats').classList.add('hidden');
            nextQuestion();
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) endGame();
                timerEl.innerText = timeLeft;
            }, 1000);
        }

        function nextQuestion() {
            const qData = questions[Math.floor(Math.random() * questions.length)];
            questionEl.innerText = qData.q;
            optionsEl.innerHTML = '';
            
            [...qData.options].sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, qData.a);
                optionsEl.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct) {
            if (selected === correct) {
                score++;
                combo++;
                maxCombo = Math.max(maxCombo, combo);
                timeLeft += 2;
                comboDisp.innerText = `${combo} COMBO`;
            } else {
                combo = 0;
                timeLeft -= 3;
                comboDisp.innerText = "";
            }
            updateStats();
            nextQuestion();
        }

        function updateStats() {
            scoreEl.innerText = score;
            maxComboEl.innerText = maxCombo;
            timerEl.innerText = timeLeft;
        }

        function getRank(s) {
            if (s >= 30) return "MASTER";
            if (s >= 20) return "EXPERT";
            if (s >= 10) return "ADVANCED";
            return "BEGINNER";
        }

        function endGame() {
            clearInterval(timerInterval);
            overlay.classList.remove('hidden');
            document.getElementById('title').innerText = "FINISH";
            document.getElementById('description').innerHTML = `SCORE: ${score}<br>MAX COMBO: ${maxCombo}`;
            
            const rankArea = document.getElementById('result-stats');
            rankArea.classList.remove('hidden');
            document.getElementById('final-rank').innerText = `RANK: ${getRank(score)}`;
            
            startBtn.innerText = "RETRY";
        }

        startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
