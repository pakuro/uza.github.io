<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>因数分解トライアル - 統合版</title>
    <style>
        /* CSS: デザイン部分 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #game-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }
        h1 { color: #333; font-size: 24px; }
        #formula {
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            min-height: 40px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #2980b9; }
        #score-board { margin-top: 20px; font-weight: bold; color: #555; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>因数分解トライアル</h1>
    
    <div id="menu">
        <p>難易度を選んでください</p>
        <button class="btn" onclick="startGame(1)">Lv.1 (x² + px + q)</button>
        <button class="btn" onclick="startGame(2)">Lv.2 (ax² + bx + c)</button>
    </div>

    <div id="game" class="hidden">
        <div id="formula"></div>
        <div id="options"></div>
        <div id="score-board">スコア: <span id="score">0</span></div>
        <button class="btn" style="background:#95a5a6;" onclick="backToMenu()">メニューに戻る</button>
    </div>
</div>

<script>
    /* JavaScript: ロジック部分 */
    let score = 0;
    let currentAnswer = "";

    function startGame(level) {
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        score = 0;
        updateScore();
        nextQuestion(level);
    }

    function backToMenu() {
        document.getElementById('menu').classList.remove('hidden');
        document.getElementById('game').classList.add('hidden');
    }

    function updateScore() {
        document.getElementById('score').innerText = score;
    }

    function nextQuestion(level) {
        let questionData = generateQuestion(level);
        document.getElementById('formula').innerText = questionData.display;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = ""; // 以前のボタンを消去

        // 正解とダミーの選択肢を混ぜる
        let choices = [questionData.answer, ...questionData.dummies];
        choices.sort(() => Math.random() - 0.5);

        choices.forEach(choice => {
            let btn = document.createElement('button');
            btn.className = "btn";
            btn.innerText = choice;
            btn.onclick = () => checkAnswer(choice, questionData.answer, level);
            optionsDiv.appendChild(btn);
        });
    }

    function generateQuestion(level) {
        let a, b, c, d;
        if (level === 1) {
            // (x + a)(x + b)
            a = Math.floor(Math.random() * 9) + 1;
            b = Math.floor(Math.random() * 9) + 1;
            return {
                display: `x² + ${a + b}x + ${a * b}`,
                answer: `(x + ${a})(x + ${b})`,
                dummies: [`(x + ${a+1})(x + ${b-1})`, `(x - ${a})(x - ${b})`, `(x + ${a*b})(x + 1)`]
            };
        } else {
            // (ax + b)(cx + d) たすき掛け
            a = Math.floor(Math.random() * 2) + 2; // 2 or 3
            c = Math.floor(Math.random() * 2) + 1; // 1 or 2
            b = Math.floor(Math.random() * 4) + 1;
            d = Math.floor(Math.random() * 4) + 1;
            let x2 = a * c;
            let x = a * d + b * c;
            let con = b * d;
            return {
                display: `${x2}x² + ${x}x + ${con}`,
                answer: `(${a}x + ${b})(${c}x + ${d})`,
                dummies: [`(${a}x + ${d})(${c}x + ${b})`, `(${a*c}x + 1)(x + ${con})`, `(${a}x - ${b})(${c}x - ${d})`]
            };
        }
    }

    function checkAnswer(selected, correct, level) {
        if (selected === correct) {
            score += 10;
            alert("正解！");
        } else {
            alert("残念！正解は " + correct);
        }
        updateScore();
        nextQuestion(level);
    }
</script>

</body>
</html>
