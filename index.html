<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>因数分解トライアル</title>
    <style>
        /* CSS: デザイン設定 */
        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            height: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ホームボタン */
        #home-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            z-index: 100;
        }
        #home-btn:hover { background: #f8f8f8; border-color: #bbb; }

        /* ヘッダー統計情報 */
        header {
            display: flex;
            justify-content: space-around;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .stat { text-align: center; min-width: 80px; }
        .stat span { font-size: 0.75rem; color: #888; font-weight: bold; display: block; margin-bottom: 5px; }
        .stat div { font-size: 1.8rem; font-weight: bold; font-family: 'Courier New', Courier, monospace; }

        /* 問題表示エリア */
        .instruction { text-align: center; color: #666; margin-bottom: 10px; }
        .math-expr {
            font-size: 3rem;
            text-align: center;
            margin: 60px 0;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 選択肢ボタン */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: auto;
        }
        .option {
            padding: 20px;
            font-size: 1.3rem;
            border: 2px solid #eee;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .option:hover { border-color: #333; background-color: #fdfdfd; transform: translateY(-2px); }
        .option:active { transform: translateY(0); }

        /* 演出用クラス */
        .time-plus { color: #28a745; transform: scale(1.2); transition: 0.2s; }
        .time-minus { color: #dc3545; transform: scale(1.2); transition: 0.2s; }
        .hidden { display: none !important; }

        /* オーバーレイ（開始・終了画面） */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.98);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            text-align: center;
        }
        .overlay h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .overlay p { font-size: 1.2rem; color: #666; margin-bottom: 30px; }
        #start-btn {
            padding: 18px 60px;
            font-size: 1.4rem;
            background: #333;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        #start-btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div id="game-container">
        <button id="home-btn" class="hidden">終了する</button>

        <header>
            <div class="stat"><span>TIME</span><div id="timer">30</div></div>
            <div class="stat"><span>正解</span><div id="score">0</div></div>
            <div class="stat"><span>不正解</span><div id="mistakes">0</div></div>
            <div class="stat"><span>COMBO</span><div id="combo">0</div></div>
        </header>

        <main id="game-screen">
            <p class="instruction">因数分解せよ</p>
            <div id="question" class="math-expr">---</div>
            <div id="options" class="options-grid"></div>
        </main>

        <div id="overlay" class="overlay">
            <div class="content">
                <h1 id="overlay-title">因数分解トライアル</h1>
                <p id="result-text">準備はいいですか？</p>
                <button id="start-btn">スタート</button>
            </div>
        </div>
    </div>

    <script>
        // JavaScript: ロジック設定
        const questions = [
            { q: "x² + 20x + 100", a: "(x + 10)²", options: ["(x + 10)²", "(x + 2)(x - 1)", "(x + 6)(x - 9)", "(x - 10)²"] },
            { q: "x² - 20x + 100", a: "(x - 10)²", options: ["(x + 10)²", "(x - 10)²", "(x + 10)(x - 3)", "(x - 1)(x - 5)"] },
            { q: "x² - 8x + 16", a: "(x - 4)²", options: ["(x + 4)²", "(x - 4)²", "(x + 2)(x + 8)", "(x - 2)(x - 8)"] },
            { q: "x² + 17x + 70", a: "(x + 10)(x + 7)", options: ["(x + 10)(x + 7)", "(x + 10)(x - 7)", "(x + 7)(x - 10)", "(x - 10)(x - 7)"] },
            { q: "x² - 12x + 36", a: "(x - 6)²", options: ["(x - 6)²", "(x + 6)²", "(x - 4)(x - 9)", "(x + 4)(x + 9)"] },
            { q: "x² + 3x - 18", a: "(x + 6)(x - 3)", options: ["(x + 6)(x - 3)", "(x - 6)(x + 3)", "(x + 9)(x - 2)", "(x + 2)(x - 9)"] },
            { q: "3x² + 24x - 27", a: "3(x + 9)(x - 1)", options: ["3(x + 9)(x - 1)", "3(x + 1)(x + 9)", "3(x - 1)(x - 9)", "3(x + 1)(x - 9)"] }
        ];

        let score = 0;
        let mistakes = 0;
        let combo = 0;
        let timeLeft = 30;
        let timerInterval;

        const timerEl = document.getElementById('timer');
        const scoreEl = document.getElementById('score');
        const mistakesEl = document.getElementById('mistakes');
        const comboEl = document.getElementById('combo');
        const homeBtn = document.getElementById('home-btn');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');

        function startGame() {
            score = 0;
            mistakes = 0;
            combo = 0;
            timeLeft = 30;
            updateStats();
            
            overlay.classList.add('hidden');
            homeBtn.classList.remove('hidden');
            
            nextQuestion();
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    endGame("タイムアップ！");
                }
                timerEl.innerText = timeLeft;
            }, 1000);
        }

        function nextQuestion() {
            const qData = questions[Math.floor(Math.random() * questions.length)];
            questionEl.innerText = qData.q;
            optionsEl.innerHTML = '';
            
            // 選択肢をシャッフル
            [...qData.options].sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, qData.a);
                optionsEl.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct) {
            if (selected === correct) {
                score++;
                combo++;
                timeLeft += 2; // 正解：+2秒
                flashEffect('time-plus');
            } else {
                mistakes++;
                combo = 0;
                timeLeft = Math.max(0, timeLeft - 2); // 不正解：-2秒
                flashEffect('time-minus');
            }
            updateStats();
            nextQuestion();
        }

        function flashEffect(className) {
            timerEl.classList.add(className);
            setTimeout(() => timerEl.classList.remove(className), 300);
        }

        function updateStats() {
            scoreEl.innerText = score;
            mistakesEl.innerText = mistakes;
            comboEl.innerText = combo;
            timerEl.innerText = timeLeft;
        }

        function endGame(title) {
            clearInterval(timerInterval);
            overlay.classList.remove('hidden');
            homeBtn.classList.add('hidden');
            
            document.getElementById('overlay-title').innerText = title;
            document.getElementById('result-text').innerText = `正解: ${score} | 不正解: ${mistakes}\nお疲れ様でした！`;
            startBtn.innerText = "もう一度プレイ";
        }

        startBtn.addEventListener('click', startGame);
        homeBtn.addEventListener('click', () => endGame("中断しました"));
    </script>
</body>
</html>
