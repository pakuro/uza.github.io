<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>数学4択早押しクイズ - 見やすい版</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #eef2f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 450px; text-align: center; }
        #timer-bar-container { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin: 20px 0; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: #ff4757; transition: width 0.1s linear; }
        #question { font-size: 1.8rem; font-weight: bold; margin: 30px 0; color: #2f3542; min-height: 2.5rem; }
        .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .choice-btn { background: #f8f9fa; border: 2px solid #dfe4ea; padding: 15px; border-radius: 10px; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; color: #2f3542; }
        .choice-btn:hover { background: #3742fa; color: white; border-color: #3742fa; transform: translateY(-2px); }
        .choice-btn:active { transform: translateY(0); }
        #score-display { font-size: 1.1rem; color: #747d8c; margin-bottom: 10px; }
        .hidden { display: none; }
        h1 { margin-top: 0; color: #3742fa; }
        button.start-btn { background: #3742fa; color: white; border: none; padding: 15px 40px; border-radius: 30px; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen">
        <h1>数学 4択クイズ</h1>
        <p>制限時間は1問10秒！</p>
        <button class="start-btn" onclick="startGame()">ゲームスタート</button>
    </div>

    <div id="game-play" class="hidden">
        <div id="score-display">スコア: 0</div>
        <div id="timer-bar-container"><div id="timer-bar"></div></div>
        <div id="question"></div>
        <div class="choices-grid">
            <button class="choice-btn" onclick="checkAnswer(0)"></button>
            <button class="choice-btn" onclick="checkAnswer(1)"></button>
            <button class="choice-btn" onclick="checkAnswer(2)"></button>
            <button class="choice-btn" onclick="checkAnswer(3)"></button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="result-msg">GAME OVER</h2>
        <p id="final-score" style="font-size: 1.5rem;"></p>
        <button class="start-btn" onclick="startGame()">リトライ</button>
    </div>
</div>

<script>
    let score = 0;
    let timeLeft = 100;
    let timerInterval;
    let correctAnswerIndex = 0;

    function startGame() {
        score = 0;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('game-play').classList.remove('hidden');
        nextQuestion();
    }

    function generateQuestion() {
        const isFactorize = Math.random() > 0.5;
        const a = Math.floor(Math.random() * 6) + 1;
        const b = Math.floor(Math.random() * 6) + 1;
        
        const sum = a + b;
        const prod = a * b;

        let questionText = "";
        let choices = [];
        let correctStr = "";

        if (isFactorize) {
            // 因数分解 (x² + 5x + 6)
            questionText = `x² + ${sum}x + ${prod}`;
            correctStr = `(x + ${a})(x + ${b})`;
            choices = [
                correctStr,
                `(x - ${a})(x - ${b})`,
                `(x + ${sum})(x + ${prod})`,
                `(x + ${a+1})(x + ${b})`
            ];
        } else {
            // 展開 ((x+2)(x+3))
            questionText = `(x + ${a})(x + ${b})`;
            correctStr = `x² + ${sum}x + ${prod}`;
            choices = [
                correctStr,
                `x² - ${sum}x + ${prod}`,
                `x² + ${sum}x - ${prod}`,
                `x² + ${Math.abs(a-b)}x + ${prod}`
            ];
        }

        // 選択肢をシャッフル
        for (let i = choices.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [choices[i], choices[j]] = [choices[j], choices[i]];
        }

        document.getElementById('question').innerHTML = questionText; // innerHTMLに変更
        correctAnswerIndex = choices.indexOf(correctStr);
        const buttons = document.querySelectorAll('.choice-btn');
        buttons.forEach((btn, idx) => {
            btn.innerHTML = choices[idx]; // innerHTMLに変更
        });
    }

    function nextQuestion() {
        document.getElementById('score-display').innerText = `スコア: ${score}`;
        generateQuestion();
        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 100;
        const bar = document.getElementById('timer-bar');
        
        timerInterval = setInterval(() => {
            timeLeft -= 1;
            bar.style.width = timeLeft + "%";
            if (timeLeft <= 0) {
                gameOver("タイムアップ！");
            }
        }, 100);
    }

    function checkAnswer(index) {
        if (index === correctAnswerIndex) {
            score++;
            nextQuestion();
        } else {
            gameOver("不正解！");
        }
    }

    function gameOver(msg) {
        clearInterval(timerInterval);
        document.getElementById('game-play').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('result-msg').innerText = msg;
        document.getElementById('final-score').innerText = `最終スコア: ${score}`;
    }
</script>

</body>
</html>
