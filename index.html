<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>因数分解トライアル</title>
    <style>
        /* CSS: 全体のデザイン */
        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
            overflow: hidden;
        }

        #game-container {
            width: 95%;
            max-width: 800px;
            height: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 30px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* 終了ボタン */
        #home-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            z-index: 100;
        }

        /* ヘッダー統計 */
        header {
            display: flex;
            justify-content: space-around;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .stat { text-align: center; min-width: 80px; }
        .stat span { font-size: 0.75rem; color: #888; font-weight: bold; display: block; }
        .stat div { font-size: 1.8rem; font-weight: bold; }

        /* 問題エリア */
        .math-expr {
            font-size: 3rem;
            text-align: center;
            margin: 60px 0;
            font-weight: bold;
        }

        /* フィードバック表示 (clear! / mis!) */
        #feedback {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }
        .show-clear { color: #28a745; animation: feedback-anim 0.6s ease-out; }
        .show-mis { color: #dc3545; animation: feedback-anim 0.6s ease-out; }

        @keyframes feedback-anim {
            0% { opacity: 0; transform: translate(-50%, -40%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -60%) scale(1); }
        }

        /* 選択肢 */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: auto;
        }
        .option {
            padding: 20px;
            font-size: 1.3rem;
            border: 2px solid #eee;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option:hover { border-color: #333; background-color: #fdfdfd; }

        /* 特殊効果 */
        .time-plus { color: #28a745; transform: scale(1.3); transition: 0.2s; }
        .time-minus { color: #dc3545; transform: scale(1.3); transition: 0.2s; }
        .hidden { display: none !important; }

        /* オーバーレイ */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.98);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            text-align: center;
        }
        #start-btn {
            padding: 18px 60px;
            font-size: 1.4rem;
            background: #333; color: white;
            border: none; border-radius: 50px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <button id="home-btn" class="hidden">終了する</button>

        <header>
            <div class="stat"><span>TIME</span><div id="timer">30</div></div>
            <div class="stat"><span>正解</span><div id="score">0</div></div>
            <div class="stat"><span>不正解</span><div id="mistakes">0</div></div>
            <div class="stat"><span>COMBO</span><div id="combo">0</div></div>
        </header>

        <div id="feedback"></div>

        <main id="game-screen">
            <div id="question" class="math-expr">---</div>
            <div id="options" class="options-grid"></div>
        </main>

        <div id="overlay" class="overlay">
            <div class="content">
                <h1 id="overlay-title">因数分解トライアル</h1>
                <p id="result-text">間違えると-2秒、正解で+2秒！</p>
                <button id="start-btn">スタート</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "x² + 20x + 100", a: "(x + 10)²", options: ["(x + 10)²", "(x + 2)(x - 1)", "(x + 6)(x - 9)", "(x - 10)²"] },
            { q: "x² - 20x + 100", a: "(x - 10)²", options: ["(x + 10)²", "(x - 10)²", "(x + 10)(x - 3)", "(x - 1)(x - 5)"] },
            { q: "x² - 8x + 16", a: "(x - 4)²", options: ["(x + 4)²", "(x - 4)²", "(x + 2)(x + 8)", "(x - 2)(x - 8)"] },
            { q: "x² + 17x + 70", a: "(x + 10)(x + 7)", options: ["(x + 10)(x + 7)", "(x + 10)(x - 7)", "(x + 7)(x - 10)", "(x - 10)(x - 7)"] },
            { q: "x² - 12x + 36", a: "(x - 6)²", options: ["(x - 6)²", "(x + 6)²", "(x - 4)(x - 9)", "(x + 4)(x + 9)"] },
            { q: "x² + 3x - 18", a: "(x + 6)(x - 3)", options: ["(x + 6)(x - 3)", "(x - 6)(x + 3)", "(x + 9)(x - 2)", "(x + 2)(x - 9)"] },
            { q: "3x² + 24x - 27", a: "3(x + 9)(x - 1)", options: ["3(x + 9)(x - 1)", "3(x + 1)(x + 9)", "3(x - 1)(x - 9)", "3(x + 1)(x - 9)"] }
        ];

        let score = 0, mistakes = 0, combo = 0, timeLeft = 30, timerInterval;

        const timerEl = document.getElementById('timer'),
              scoreEl = document.getElementById('score'),
              mistakesEl = document.getElementById('mistakes'),
              comboEl = document.getElementById('combo'),
              homeBtn = document.getElementById('home-btn'),
              startBtn = document.getElementById('start-btn'),
              overlay = document.getElementById('overlay'),
              questionEl = document.getElementById('question'),
              optionsEl = document.getElementById('options'),
              feedbackEl = document.getElementById('feedback');

        function startGame() {
            score = 0; mistakes = 0; combo = 0; timeLeft = 30;
            updateStats();
            overlay.classList.add('hidden');
            homeBtn.classList.remove('hidden');
            nextQuestion();
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) { timeLeft = 0; endGame("タイムアップ！"); }
                timerEl.innerText = timeLeft;
            }, 1000);
        }

        function nextQuestion() {
            const qData = questions[Math.floor(Math.random() * questions.length)];
            questionEl.innerText = qData.q;
            optionsEl.innerHTML = '';
            [...qData.options].sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, qData.a);
                optionsEl.appendChild(btn);
            });
        }

        function checkAnswer(selected, correct) {
            feedbackEl.className = ''; // リセット
            void feedbackEl.offsetWidth; // アニメーション再トリガー用

            if (selected === correct) {
                score++; combo++; timeLeft += 2;
                feedbackEl.innerText = "clear!";
                feedbackEl.classList.add('show-clear');
                timerEl.classList.add('time-plus');
            } else {
                mistakes++; combo = 0; timeLeft = Math.max(0, timeLeft - 2);
                feedbackEl.innerText = "mis!";
                feedbackEl.classList.add('show-mis');
                timerEl.classList.add('time-minus');
            }
            
            setTimeout(() => {
                timerEl.classList.remove('time-plus', 'time-minus');
            }, 300);

            updateStats();
            nextQuestion();
        }

        function updateStats() {
            scoreEl.innerText = score;
            mistakesEl.innerText = mistakes;
            comboEl.innerText = combo;
            timerEl.innerText = timeLeft;
        }

        function endGame(title) {
            clearInterval(timerInterval);
            overlay.classList.remove('hidden');
            homeBtn.classList.add('hidden');
            document.getElementById('overlay-title').innerText = title;
            document.getElementById('result-text').innerText = `正解数: ${score}問\nお疲れ様でした！`;
            startBtn.innerText = "もう一度プレイ";
        }

        startBtn.addEventListener('click', startGame);
        homeBtn.addEventListener('click', () => endGame("中断しました"));
    </script>
</body>
</html>
